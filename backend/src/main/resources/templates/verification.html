<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Goat Image</title>
    <meta charset="UTF-8">
</head>

<body style="font-family: Arial, sans-serif;">
<table style="max-width: 80rem; min-height: 100vh; padding: 2rem; margin: 0 auto; background-color: #f5f5f5;">
    <tr>
        <td align="center">
            <table style="background-color: white; border-radius: 5px; padding: 20px;">
                <tr>
                    <td>
                        <div style="text-align: left; font-size: 20px;">Goat Image</div>
                    </td>
                    <td>
                        <div style="text-align: right; font-size: 20px;">Chỉnh sửa ảnh mọi lúc</div>
                    </td>
                </tr>
                <tr>
                    <td colspan="2" style="margin: 15px 0; border-top: 1px solid rgba(5, 5, 5, 0.06);"></td>
                </tr>
                <tr>
                    <td colspan="2">
                        <h2 style="color: #333;">Chào mừng đến với website!</h2>
                        <p style="font-size: 16px;">Hãy nhập code ở dưới để kích hoạt tài khoản của bạn:</p>
                        <div style="background-color: #fff; padding: 20px; border-radius: 5px; box-shadow: 0 0 10px rgba(0,0,0,0.1);">
                            <h3 style="color: #333;">Mã xác thực:</h3>
                            <p style="font-size: 18px; font-weight: bold; color: #007bff;" th:text="${verificationCode}"></p>
                        </div>
                    </td>
                </tr>
                <tr>
                    <td colspan="2">
                        <div style="padding-top: 20px; text-align: left; font-size: 16px;">Trân trọng,</div>
                        <div style="text-align: left; font-size: 16px;">Goat.</div>
                    </td>
                </tr>
            </table>
        </td>
    </tr>
</table>
</body>

</html>
